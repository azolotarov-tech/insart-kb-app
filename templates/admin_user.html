{% extends "base.html" %}

{% block tabs %}{% endblock %}

{% block layout %}
<div style="display: flex; position: relative;">

  {% include "_admin_sidebar.html" %}

  <main style="flex: 1; padding: 48px 56px; max-width: 760px;">

    <div style="margin-bottom: 32px;">
      <h1 style="font-size: 28px; font-weight: 700; letter-spacing: -.5px; margin: 0 0 10px; color: var(--text);">
        admin
      </h1>
      <p style="font-size: 15px; color: var(--text-muted); margin: 0; line-height: 1.6;">
        Admin panel with tools for page administration.
      </p>
    </div>

    <div style="background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
                padding: 32px; color: var(--text-muted); font-size: 15px;">
      Page development in progress.
    </div>

  </main>
</div>
{% endblock %}
