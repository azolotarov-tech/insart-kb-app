{% extends "base.html" %}

{% block tabs %}{% endblock %}

{% block layout %}
<div style="min-height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center; padding: 40px 16px;">
  <div style="width: 100%; max-width: 400px;">

    <div style="text-align: center; margin-bottom: 32px;">
      <h1 style="font-size: 24px; font-weight: 700; letter-spacing: -.4px; margin: 0 0 8px; color: var(--text);">Admin Login</h1>
      <p style="font-size: 14px; color: var(--text-muted); margin: 0;">Sign in to access the administration area.</p>
    </div>

    {% if error %}
    <div style="background: var(--coral-tint); color: var(--coral); border: 1px solid var(--coral);
                border-radius: 10px; padding: 14px 18px; margin-bottom: 20px; font-size: 14px;">
      {{ error }}
    </div>
    {% endif %}

    <div style="background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
                padding: 32px; box-shadow: var(--shadow);">
      <form method="POST" style="display: flex; flex-direction: column; gap: 20px;">

        <div>
          <label style="display: block; font-weight: 600; font-size: 13px; margin-bottom: 7px; color: var(--text);">
            Username
          </label>
          <input
            type="text"
            name="username"
            value="admin"
            required
            style="width: 100%; height: 42px; border: 1px solid var(--border); border-radius: 8px;
                   background: var(--bg); color: var(--text); padding: 0 12px;
                   font: inherit; font-size: 14px; outline: none; box-sizing: border-box;"
            onfocus="this.style.borderColor='var(--accent)'"
            onblur="this.style.borderColor='var(--border)'"
          >
        </div>

        <div>
          <label style="display: block; font-weight: 600; font-size: 13px; margin-bottom: 7px; color: var(--text);">
            Password
          </label>
          <input
            type="password"
            name="password"
            required
            placeholder="Enter admin password"
            style="width: 100%; height: 42px; border: 1px solid var(--border); border-radius: 8px;
                   background: var(--bg); color: var(--text); padding: 0 12px;
                   font: inherit; font-size: 14px; outline: none; box-sizing: border-box;"
            onfocus="this.style.borderColor='var(--accent)'"
            onblur="this.style.borderColor='var(--border)'"
          >
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; height: 44px; font-size: 15px;">
          Sign In
        </button>

      </form>
    </div>

  </div>
</div>
{% endblock %}
