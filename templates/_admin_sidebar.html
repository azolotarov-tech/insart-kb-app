<aside style="width: 220px; min-width: 220px; background: var(--surface); border-right: 1px solid var(--border);
              min-height: calc(100vh - 64px); padding: 28px 0; flex-shrink: 0;
              display: flex; flex-direction: column;">

  <div style="padding: 0 20px 20px; border-bottom: 1px solid var(--border);">
    <p style="font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
              color: var(--text-faint); margin: 0;">Administration</p>
  </div>

  <nav style="padding: 12px 12px 0;">
    <a href="/admin/user"
       style="display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px;
              font-size: 14px; font-weight: 500; text-decoration: none; margin-bottom: 4px;
              color: {% if active_admin_tab == 'user' %}var(--accent){% else %}var(--text-muted){% endif %};
              background: {% if active_admin_tab == 'user' %}var(--accent-tint){% else %}transparent{% endif %};">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           style="width:16px;height:16px;flex-shrink:0;">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      User
    </a>

    <a href="/admin/upload"
       style="display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px;
              font-size: 14px; font-weight: 500; text-decoration: none; margin-bottom: 4px;
              color: {% if active_admin_tab == 'upload' %}var(--accent){% else %}var(--text-muted){% endif %};
              background: {% if active_admin_tab == 'upload' %}var(--accent-tint){% else %}transparent{% endif %};">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           style="width:16px;height:16px;flex-shrink:0;">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Upload Document
    </a>
  </nav>

  <div style="margin-top: auto; padding: 0 12px 8px;">
    <a href="/admin/logout"
       style="display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px;
              font-size: 13px; font-weight: 500; text-decoration: none; color: var(--text-faint);">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           style="width:15px;height:15px;flex-shrink:0;">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sign out
    </a>
  </div>
</aside>
